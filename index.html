<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GiftCard Pro - Fintech Trading Platform</title>
    <style>
      /* Preloader styles - prevents white screen */
      #preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #ec4899 100%);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
      }
      #preloader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #preloader .logo-container {
        position: relative;
        width: 96px;
        height: 96px;
      }
      #preloader .logo-container::before,
      #preloader .logo-container::after {
        content: '';
        position: absolute;
        inset: -10px;
        border-radius: 50%;
        background: rgba(255,255,255,0.2);
        animation: pulse-ring 2s ease-out infinite;
      }
      #preloader .logo-container::after {
        animation-delay: 0.5s;
        background: rgba(255,255,255,0.1);
      }
      @keyframes pulse-ring {
        0% { transform: scale(0.8); opacity: 1; }
        100% { transform: scale(1.5); opacity: 0; }
      }
      #preloader .logo {
        width: 96px;
        height: 96px;
        background: white;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        position: relative;
        z-index: 1;
      }
      #preloader .logo svg {
        width: 48px;
        height: 48px;
        color: #4f46e5;
      }
      #preloader h1 {
        color: white;
        font-size: 28px;
        font-weight: bold;
        margin-top: 24px;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #preloader p {
        color: rgba(255,255,255,0.8);
        font-size: 14px;
        margin-top: 8px;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #preloader .progress-bar {
        width: 256px;
        height: 4px;
        background: rgba(255,255,255,0.2);
        border-radius: 2px;
        margin-top: 32px;
        overflow: hidden;
      }
      #preloader .progress-fill {
        height: 100%;
        background: white;
        border-radius: 2px;
        width: 0%;
        animation: progress 2.5s ease-out forwards;
      }
      @keyframes progress {
        0% { width: 0%; }
        100% { width: 100%; }
      }
      #preloader .loading-text {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 12px;
        color: rgba(255,255,255,0.6);
        font-size: 13px;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #preloader .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Preloader - prevents white screen -->
    <div id="preloader">
      <div class="logo-container">
        <div class="logo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="8" width="18" height="4" rx="1"/>
            <path d="M12 8v13"/>
            <path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/>
            <path d="M7.5 8a2.5 2.5 0 0 1 0-5 2.5 2.5 0 0 1 2.5 2.5v5"/>
            <path d="M16.5 8v-2.5a2.5 2.5 0 0 1 5 0 2.5 2.5 0 0 1-2.5 2.5h-5"/>
          </svg>
        </div>
      </div>
      <h1>GiftCard Pro</h1>
      <p>Secure Gift Card Trading Platform</p>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
      <div class="loading-text">
        <div class="spinner"></div>
        <span>Loading...</span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide preloader when app is ready
      window.addEventListener('load', function() {
        setTimeout(function() {
          var preloader = document.getElementById('preloader');
          if (preloader) {
            preloader.classList.add('hidden');
            setTimeout(function() {
              preloader.style.display = 'none';
            }, 500);
          }
        }, 2500);
      });
    </script>
  </body>
</html>
